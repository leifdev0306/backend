services:
  - type: web
    name: cubatravel-backend
    runtime: python
    repo: https://github.com/leifdev0306/backend
    plan: free
    region: oregon
    buildCommand: ./build.sh
    startCommand: gunicorn backend.wsgi:application
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: leifdev-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: DJANGO_SETTINGS_MODULE
        value: backend.settings